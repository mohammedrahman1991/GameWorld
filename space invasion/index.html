<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Invasion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
  #gameContainer { position: relative; }
  canvas { display: block; border: 1px solid #222; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; }
  #hud { display: flex; justify-content: space-between; padding: 8px 12px; color: #0ff; font-size: 14px; text-shadow: 0 0 8px #0ff; }
  #controls { position: absolute; bottom: 10px; right: 10px; pointer-events: all; }
  #dpad { display: grid; grid-template-columns: 52px 52px 52px; grid-template-rows: 52px 52px 52px; gap: 4px; }
  .ctrl-btn {
    width: 52px; height: 52px; background: rgba(0,255,255,0.12);
    border: 2px solid rgba(0,255,255,0.5); border-radius: 8px;
    color: #0ff; font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    user-select: none; transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active { background: rgba(0,255,255,0.35); }
  .ctrl-blank { width: 52px; height: 52px; }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.82); display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: #fff;
    pointer-events: all;
  }
  #overlay h1 { font-size: 36px; color: #0ff; text-shadow: 0 0 20px #0ff; margin-bottom: 12px; }
  #overlay p { font-size: 16px; color: #aef; margin-bottom: 8px; text-align: center; max-width: 360px; line-height: 1.6; }
  #overlay button {
    margin-top: 20px; padding: 12px 36px; font-size: 18px;
    background: transparent; border: 2px solid #0ff; color: #0ff;
    cursor: pointer; border-radius: 6px; font-family: inherit;
    text-shadow: 0 0 8px #0ff; transition: all 0.2s;
  }
  #overlay button:hover { background: rgba(0,255,255,0.2); }
  #powerupIndicator { position: absolute; bottom: 200px; left: 12px; color: #ff0; font-size: 15px; font-weight: bold; text-shadow: 0 0 12px #ff0, 0 0 4px #ff0; pointer-events: none; letter-spacing: 1px; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="canvas"></canvas>
  <div id="ui">
    <div id="hud">
      <span id="hudLives">♥ 3</span>
      <span id="hudLevel">LVL 1</span>
      <span id="hudScore">0</span>
    </div>
  </div>
  <div id="powerupIndicator" id="powerupIndicator"></div>
  <div id="controls">
    <div id="dpad">
      <div class="ctrl-blank"></div>
      <button class="ctrl-btn" id="btnUp">▲</button>
      <div class="ctrl-blank"></div>
      <button class="ctrl-btn" id="btnLeft">◄</button>
      <div class="ctrl-blank"></div>
      <button class="ctrl-btn" id="btnRight">►</button>
      <div class="ctrl-blank"></div>
      <button class="ctrl-btn" id="btnDown">▼</button>
      <div class="ctrl-blank"></div>
    </div>
  </div>
  <div id="overlay">
    <h1>SPACE INVASION</h1>
    <p>Click / Tap to shoot<br>Arrow keys or D-pad to move<br>Survive 15 levels. Boss at level 5!<br><br><b style="color:#ff0">POWERUPS drop from enemies:</b><br>🟡 M = Multi-shot &nbsp; 🟣 L = Laser &nbsp; 🟢 B = Boomerang</p>
    <button id="startBtn">START GAME</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const hudLives = document.getElementById('hudLives');
const hudLevel = document.getElementById('hudLevel');
const hudScore = document.getElementById('hudScore');
const powerupIndicator = document.getElementById('powerupIndicator');

const W = 480, H = 640;
canvas.width = W; canvas.height = H;
document.getElementById('gameContainer').style.width = W + 'px';
document.getElementById('gameContainer').style.height = H + 'px';

// ── State ──────────────────────────────────────────────────────────────────
let state = 'menu'; // menu | playing | dead | win
let level = 1, score = 0, lives = 3;
let player, bullets, enemies, enemyBullets, particles, powerups;
let keys = {}, moveUp = false, moveDown = false, moveLeft = false, moveRight = false;
let activePowerup = null, powerupTimer = 0;
let bossSpawned = false, boss = null;
let spawnTimer = 0, levelCleared = false, levelClearTimer = 0;
let shake = 0;

const POWERUP_TYPES = ['multi', 'laser', 'boomerang'];
const COLORS = { multi: '#ff0', laser: '#f0f', boomerang: '#0f8' };

// ── Helpers ────────────────────────────────────────────────────────────────
const rand = (a, b) => Math.random() * (b - a) + a;
const randInt = (a, b) => Math.floor(rand(a, b + 1));
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function spawnParticles(x, y, color, count = 12, speed = 3) {
  for (let i = 0; i < count; i++) {
    const a = rand(0, Math.PI * 2);
    const s = rand(0.5, speed);
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1, color, r: rand(1.5, 4) });
  }
}

function flashShake(amount) { shake = amount; }

// ── Init ───────────────────────────────────────────────────────────────────
function initLevel() {
  bullets = []; enemyBullets = []; enemies = []; particles = []; powerups = [];
  bossSpawned = false; boss = null; levelCleared = false; levelClearTimer = 0;
  spawnTimer = 0;
  activePowerup = null; powerupTimer = 0;
  powerupIndicator.textContent = '';

  player = {
    x: 60, y: H / 2, w: 36, h: 24,
    speed: 3.5,
    hp: 1,
    invincible: 0,
    trail: []
  };

  scheduleEnemies();
}

function startGame() {
  level = 1; score = 0; lives = 3;
  initLevel();
  state = 'playing';
  overlay.style.display = 'none';
  updateHUD();
}

function restartLevel() {
  initLevel();
  state = 'playing';
  overlay.style.display = 'none';
  updateHUD();
}

function updateHUD() {
  hudLives.textContent = '♥ ' + lives;
  hudLevel.textContent = 'LVL ' + level;
  hudScore.textContent = score;
}

// ── Enemy scheduling ───────────────────────────────────────────────────────
let waveQueue = [];

function scheduleEnemies() {
  waveQueue = [];
  const baseCount = 4 + level * 2;

  // Spacing grows so each level is ~10 seconds longer than the previous
  // At 60fps, dt*60/16 ≈ 60 units/sec, so 10s = 600 units
  const spacing = Math.round(45 + (level - 1) * 600 / Math.max(baseCount, 1));

  if (level === 5 || level === 10 || level === 15) {
    // boss levels — intro grunts, powerups to arm up, then boss
    const introCount = level === 5 ? 6 : level === 10 ? 8 : 10;
    for (let i = 0; i < introCount; i++) waveQueue.push({ type: 'grunt', delay: i * spacing });
    // 3 guaranteed powerups before boss spawns
    waveQueue.push({ type: 'powerupDrop', delay: 1 * spacing });
    waveQueue.push({ type: 'powerupDrop', delay: 3 * spacing });
    waveQueue.push({ type: 'powerupDrop', delay: 5 * spacing });
    waveQueue.push({ type: 'boss', delay: introCount * spacing + 120 });
    // 2 more powerups mid-fight
    waveQueue.push({ type: 'powerupDrop', delay: introCount * spacing + 400 });
    waveQueue.push({ type: 'powerupDrop', delay: introCount * spacing + 800 });
  } else {
    const types = level < 3 ? ['grunt'] :
                  level < 7 ? ['grunt', 'shooter'] :
                  level < 11 ? ['grunt', 'shooter', 'zigzag'] :
                               ['grunt', 'shooter', 'zigzag', 'fast'];
    for (let i = 0; i < baseCount; i++) {
      const t = types[randInt(0, types.length - 1)];
      waveQueue.push({ type: t, delay: i * spacing + randInt(0, 20) });
    }
    // Guaranteed powerup drop mid-level
    waveQueue.push({ type: 'powerupDrop', delay: Math.round(baseCount * spacing * 0.45) });
  }
}

function processWaveQueue(dt) {
  if (waveQueue.length === 0) return;
  spawnTimer += dt;
  while (waveQueue.length > 0 && spawnTimer >= waveQueue[0].delay) {
    const w = waveQueue.shift();
    if (w.type === 'boss') spawnBoss();
    else if (w.type === 'powerupDrop') spawnGuaranteedPowerup();
    else spawnEnemy(w.type);
  }
}

// ── Enemy factory ──────────────────────────────────────────────────────────
function spawnEnemy(type) {
  const y = rand(40, H - 40);
  const speedMult = 1 + (level - 1) * 0.08;
  let e = { type, x: W + 20, y, angle: 0, shootTimer: 0, hp: 1, maxHp: 1, reward: 10 };

  switch (type) {
    case 'grunt':
      e.vx = -rand(1.2, 2.2) * speedMult; e.vy = 0;
      e.w = 28; e.h = 20; e.color = '#f44'; e.shootInterval = 999999;
      break;
    case 'shooter':
      e.vx = -rand(0.8, 1.4) * speedMult; e.vy = 0;
      e.w = 30; e.h = 22; e.color = '#f84'; e.shootInterval = 120 - level * 3;
      e.hp = 2; e.maxHp = 2; e.reward = 20;
      break;
    case 'zigzag':
      e.vx = -rand(1.0, 1.8) * speedMult; e.vy = rand(1, 2) * (Math.random() < 0.5 ? 1 : -1);
      e.w = 26; e.h = 18; e.color = '#af4'; e.shootInterval = 999999;
      e.reward = 15;
      break;
    case 'fast':
      e.vx = -rand(3, 4.5) * speedMult; e.vy = rand(-0.5, 0.5);
      e.w = 22; e.h = 14; e.color = '#4cf'; e.shootInterval = 999999;
      e.reward = 25;
      break;
  }
  enemies.push(e);
}

function spawnBoss() {
  bossSpawned = true;
  // Each boss tier is tougher: lvl5=easy, lvl10=medium, lvl15=hard
  const tier = level === 5 ? 1 : level === 10 ? 2 : 3;
  const hp   = tier === 1 ? 80 : tier === 2 ? 160 : 260;
  const size = tier === 1 ? {w:80,h:60} : tier === 2 ? {w:100,h:76} : {w:120,h:90};
  const col  = tier === 1 ? '#f0f' : tier === 2 ? '#f80' : '#f00';
  boss = {
    x: W - size.w - 10, y: H / 2 - size.h / 2,
    w: size.w, h: size.h,
    vx: -0.4, vy: 1.2 + tier * 0.3,
    hp, maxHp: hp,
    shootTimer: 0, shootInterval: 90 - tier * 10,
    phase: 1, enraged: false,
    color: col, tier,
    reward: 500 * tier
  };
}

// ── Bullets ────────────────────────────────────────────────────────────────
function firePlayer(clickX, clickY) {
  if (state !== 'playing') return;
  const px = player.x + player.w;
  const py = player.y + player.h / 2;

  if (!activePowerup || activePowerup === 'normal') {
    bullets.push({ x: px, y: py, vx: 9, vy: 0, w: 14, h: 4, color: '#0ff', owner: 'player' });
  } else if (activePowerup === 'multi') {
    for (let i = -2; i <= 2; i++) {
      bullets.push({ x: px, y: py, vx: 8, vy: i * 1.2, w: 12, h: 4, color: '#ff0', owner: 'player' });
    }
  } else if (activePowerup === 'laser') {
    bullets.push({ x: px, y: py, vx: 16, vy: 0, w: 40, h: 6, color: '#f0f', owner: 'player', laser: true });
  } else if (activePowerup === 'boomerang') {
    const dir = Math.atan2((clickY || py) - py, (clickX || W) - px);
    bullets.push({ x: px, y: py, vx: Math.cos(dir) * 7, vy: Math.sin(dir) * 7,
                   w: 14, h: 14, color: '#0f8', owner: 'player', boomerang: true,
                   age: 0, returnAge: 50, origVx: Math.cos(dir) * 7, origVy: Math.sin(dir) * 7 });
  }
}

function enemyShoot(e) {
  const dx = player.x - e.x, dy = (player.y + player.h / 2) - (e.y + e.h / 2);
  const d = Math.hypot(dx, dy) || 1;
  const sp = 3.5 + level * 0.15;
  enemyBullets.push({ x: e.x, y: e.y + e.h / 2, vx: dx / d * sp, vy: dy / d * sp, r: 5, color: '#f84' });
}

function bossShoot() {
  if (!boss) return;
  const cx = boss.x, cy = boss.y + boss.h / 2;
  const angles = boss.enraged
    ? [-0.4, -0.2, 0, 0.2, 0.4, Math.PI]
    : [-0.3, 0, 0.3];
  angles.forEach(a => {
    enemyBullets.push({ x: cx, y: cy, vx: Math.cos(a + Math.PI) * 4.5, vy: Math.sin(a + Math.PI) * 4.5, r: 7, color: '#f0f' });
  });
}

// ── Powerup drop ───────────────────────────────────────────────────────────
function spawnPowerupAt(x, y) {
  const type = POWERUP_TYPES[randInt(0, POWERUP_TYPES.length - 1)];
  powerups.push({ x, y, vx: -1.0, vy: rand(-0.5, 0.5), type, r: 16, age: 0 });
}
function spawnGuaranteedPowerup() {
  spawnPowerupAt(W - 30, rand(60, H - 60));
}
function maybeDropPowerup(x, y) {
  if (Math.random() < 0.35) spawnPowerupAt(x, y); // 35% chance on enemy death
}

// ── Collision ──────────────────────────────────────────────────────────────
function rectCircle(rx, ry, rw, rh, cx, cy, cr) {
  const nx = clamp(cx, rx, rx + rw), ny = clamp(cy, ry, ry + rh);
  return (cx - nx) ** 2 + (cy - ny) ** 2 < cr * cr;
}
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// ── Update ─────────────────────────────────────────────────────────────────
let lastTime = 0;
function update(ts) {
  if (state !== 'playing') { requestAnimationFrame(update); return; }
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  if (shake > 0) shake = Math.max(0, shake - 0.8);

  // Player movement
  if (keys['ArrowUp'] || moveUp)    player.y -= player.speed;
  if (keys['ArrowDown'] || moveDown)  player.y += player.speed;
  if (keys['ArrowLeft'] || moveLeft)  player.x -= player.speed;
  if (keys['ArrowRight'] || moveRight) player.x += player.speed;
  player.y = clamp(player.y, 0, H - player.h);
  player.x = clamp(player.x, 10, W * 0.5 - player.w);

  // Trail
  player.trail.unshift({ x: player.x, y: player.y + player.h / 2 });
  if (player.trail.length > 10) player.trail.pop();

  if (player.invincible > 0) player.invincible--;

  // Powerup — permanent until death or replaced by new pickup
  if (activePowerup) {
    powerupIndicator.textContent = '[ ' + activePowerup.toUpperCase() + ' ]';
  } else {
    powerupIndicator.textContent = '';
  }

  // Wave spawn
  processWaveQueue(dt * 60 / 16);

  // Update bullets
  bullets = bullets.filter(b => {
    if (b.boomerang) {
      b.age++;
      if (b.age >= b.returnAge) {
        b.vx = (player.x - b.x) / 15;
        b.vy = (player.y + player.h / 2 - b.y) / 15;
      }
    }
    b.x += b.vx; b.y += b.vy;
    return b.x > -60 && b.x < W + 60 && b.y > -60 && b.y < H + 60;
  });

  // Update enemy bullets
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    return b.x > -20 && b.x < W + 20 && b.y > -20 && b.y < H + 20;
  });

  // Update enemies
  enemies = enemies.filter(e => {
    e.x += e.vx; e.y += e.vy;
    if (e.type === 'zigzag') {
      if (e.y < 20 || e.y > H - 20 - e.h) e.vy *= -1;
    }
    e.shootTimer++;
    if (e.shootTimer >= e.shootInterval) { enemyShoot(e); e.shootTimer = 0; }

    // Bullet hits enemy
    let hit = false;
    bullets = bullets.filter(b => {
      if (rectsOverlap(b.x, b.y - b.h / 2, b.w, b.h, e.x, e.y, e.w, e.h)) {
        e.hp--;
        spawnParticles(b.x, b.y, e.color, 5);
        hit = true;
        return b.boomerang; // boomerangs pass through
      }
      return true;
    });
    if (e.hp <= 0) {
      score += e.reward; updateHUD();
      spawnParticles(e.x + e.w / 2, e.y + e.h / 2, e.color, 18, 4);
      maybeDropPowerup(e.x, e.y + e.h / 2);
      flashShake(4);
      return false;
    }
    return e.x > -80;
  });

  // Boss update
  if (boss) {
    boss.x += boss.vx; boss.y += boss.vy;
    if (boss.y < 40 || boss.y > H - 40 - boss.h) boss.vy *= -1;
    if (boss.x < W * 0.45) boss.vx = Math.abs(boss.vx);
    if (boss.x > W * 0.65) boss.vx = -Math.abs(boss.vx);

    // Enrage at 25% (was 50% — gives player more safe time)
    if (boss.hp < boss.maxHp * 0.25 && !boss.enraged) {
      boss.enraged = true;
      boss.shootInterval = 55;  // still slower than original enraged (was 35)
      boss.vx *= 1.4; boss.vy *= 1.4;
    }

    boss.shootTimer++;
    if (boss.shootTimer >= boss.shootInterval) { bossShoot(); boss.shootTimer = 0; }

    // Bullet hits boss
    bullets = bullets.filter(b => {
      if (rectsOverlap(b.x, b.y - b.h / 2, b.w, b.h, boss.x, boss.y, boss.w, boss.h)) {
        boss.hp--;
        spawnParticles(b.x, b.y, '#f0f', 4);
        return b.boomerang;
      }
      return true;
    });
    if (boss.hp <= 0) {
      score += boss.reward; updateHUD();
      spawnParticles(boss.x + boss.w / 2, boss.y + boss.h / 2, '#f0f', 50, 6);
      flashShake(12);
      boss = null;
      levelCleared = true;
    }
  }

  // Powerup collection
  powerups = powerups.filter(p => {
    p.x += p.vx; p.y += p.vy; p.age++;
    if (p.age > 600) return false;
    if (rectCircle(player.x, player.y, player.w, player.h, p.x, p.y, p.r)) {
      activePowerup = p.type;
      spawnParticles(p.x, p.y, COLORS[p.type], 20, 5);
      return false;
    }
    return p.x > -30;
  });

  // Enemy bullet hits player
  if (player.invincible === 0) {
    for (let b of enemyBullets) {
      if (rectCircle(player.x, player.y, player.w, player.h, b.x, b.y, b.r)) {
        playerHit();
        break;
      }
    }
    // Enemy collision with player
    for (let e of enemies) {
      if (rectsOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
        playerHit();
        break;
      }
    }
  }

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.life -= 0.035;
    p.vx *= 0.95; p.vy *= 0.95;
    return p.life > 0;
  });

  // Level clear check
  const isBossLevel = level === 5 || level === 10 || level === 15;
  if (!levelCleared && !isBossLevel) {
    const allSpawned = waveQueue.length === 0;
    if (allSpawned && enemies.length === 0) levelCleared = true;
  }
  if (levelCleared) {
    levelClearTimer++;
    if (levelClearTimer > 120) advanceLevel();
  }

  draw();
  requestAnimationFrame(update);
}

function playerHit() {
  spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#0ff', 20, 5);
  flashShake(8);
  player.invincible = 120;
  lives--;
  updateHUD();
  if (lives <= 0) {
    lives = 3;
    setTimeout(showDead, 600);
  }
}

function showDead() {
  state = 'dead';
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <h1>SHIP DESTROYED</h1>
    <p>Level ${level} — Score: ${score}</p>
    <button id="startBtn">RETRY LEVEL ${level}</button>`;
  document.getElementById('startBtn').onclick = restartLevel;
}

function advanceLevel() {
  level++;
  if (level > 15) {
    showWin(); return;
  }
  initLevel();
  updateHUD();
}

function showWin() {
  state = 'win';
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <h1>VICTORY!</h1>
    <p>You conquered all 15 levels!<br>Final Score: ${score}</p>
    <button id="startBtn">PLAY AGAIN</button>`;
  document.getElementById('startBtn').onclick = () => { level = 1; score = 0; lives = 3; startGame(); };
}

// ── Draw ───────────────────────────────────────────────────────────────────
function draw() {
  ctx.save();
  if (shake > 0) ctx.translate(rand(-shake, shake), rand(-shake, shake));

  // Background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Stars (static seeded pattern for perf)
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 80; i++) {
    const sx = (i * 97 + Date.now() * 0.02 * (i % 3 + 1)) % W;
    const sy = (i * 137) % H;
    ctx.fillRect(sx, sy, 1, 1);
  }

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Player trail
  player.trail.forEach((t, i) => {
    ctx.globalAlpha = (1 - i / player.trail.length) * 0.3;
    ctx.fillStyle = '#0ff';
    ctx.fillRect(t.x - 18, t.y - 3, 16, 6);
  });
  ctx.globalAlpha = 1;

  // Player
  if (player.invincible === 0 || Math.floor(player.invincible / 6) % 2 === 0) {
    drawShip(player.x, player.y, player.w, player.h);
  }

  // Enemies
  enemies.forEach(e => drawEnemy(e));

  // Boss
  if (boss) drawBoss(boss);

  // Bullets
  bullets.forEach(b => {
    ctx.fillStyle = b.color;
    if (b.boomerang) {
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(b.age * 0.3);
      ctx.fillRect(-7, -7, 14, 14);
      ctx.restore();
    } else if (b.laser) {
      ctx.shadowBlur = 10; ctx.shadowColor = b.color;
      ctx.fillRect(b.x, b.y - b.h / 2, b.w, b.h);
      ctx.shadowBlur = 0;
    } else {
      ctx.shadowBlur = 6; ctx.shadowColor = b.color;
      ctx.fillRect(b.x, b.y - b.h / 2, b.w, b.h);
      ctx.shadowBlur = 0;
    }
  });

  // Enemy bullets
  enemyBullets.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.shadowBlur = 8; ctx.shadowColor = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Powerups
  powerups.forEach(p => {
    const pulse = 0.7 + 0.3 * Math.sin(p.age * 0.08);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = COLORS[p.type];
    ctx.shadowBlur = 12; ctx.shadowColor = COLORS[p.type];
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = 'bold 11px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.type[0].toUpperCase(), p.x, p.y);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  });

  // Level clear text
  if (levelCleared && levelClearTimer < 120) {
    ctx.globalAlpha = 1 - levelClearTimer / 120;
    ctx.fillStyle = '#0ff';
    ctx.font = 'bold 40px Courier New';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 20; ctx.shadowColor = '#0ff';
    ctx.fillText(level > 15 ? 'VICTORY!' : 'LEVEL CLEAR!', W / 2, H / 2);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawShip(x, y, w, h) {
  ctx.fillStyle = '#0cf';
  ctx.shadowBlur = 12; ctx.shadowColor = '#0cf';
  // body
  ctx.beginPath();
  ctx.moveTo(x + w, y + h / 2);
  ctx.lineTo(x, y + h * 0.2);
  ctx.lineTo(x + w * 0.3, y + h * 0.5);
  ctx.lineTo(x, y + h * 0.8);
  ctx.closePath();
  ctx.fill();
  // engine glow
  ctx.fillStyle = '#ff6';
  ctx.shadowColor = '#ff6';
  ctx.beginPath();
  ctx.arc(x + 4, y + h / 2, 5 + Math.random() * 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawEnemy(e) {
  ctx.fillStyle = e.color;
  ctx.shadowBlur = 8; ctx.shadowColor = e.color;
  if (e.type === 'grunt' || e.type === 'shooter') {
    ctx.beginPath();
    ctx.moveTo(e.x, e.y + e.h / 2);
    ctx.lineTo(e.x + e.w, e.y);
    ctx.lineTo(e.x + e.w * 0.7, e.y + e.h / 2);
    ctx.lineTo(e.x + e.w, e.y + e.h);
    ctx.closePath();
    ctx.fill();
  } else if (e.type === 'zigzag') {
    ctx.beginPath();
    ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillRect(e.x, e.y, e.w, e.h);
  }
  // HP bar for multi-hp enemies
  if (e.maxHp > 1) {
    ctx.fillStyle = '#600';
    ctx.fillRect(e.x, e.y - 6, e.w, 4);
    ctx.fillStyle = '#f44';
    ctx.fillRect(e.x, e.y - 6, e.w * (e.hp / e.maxHp), 4);
  }
  ctx.shadowBlur = 0;
}

function drawBoss(b) {
  ctx.shadowBlur = 20; ctx.shadowColor = b.enraged ? '#f80' : '#f0f';
  ctx.fillStyle = b.enraged ? '#f80' : '#f0f';
  // Main body
  ctx.beginPath();
  ctx.moveTo(b.x, b.y + b.h / 2);
  ctx.lineTo(b.x + b.w * 0.3, b.y);
  ctx.lineTo(b.x + b.w, b.y + b.h * 0.3);
  ctx.lineTo(b.x + b.w, b.y + b.h * 0.7);
  ctx.lineTo(b.x + b.w * 0.3, b.y + b.h);
  ctx.closePath();
  ctx.fill();
  // HP bar
  ctx.fillStyle = '#400';
  ctx.fillRect(b.x, b.y - 14, b.w, 8);
  ctx.fillStyle = b.enraged ? '#f80' : '#f0f';
  ctx.fillRect(b.x, b.y - 14, b.w * (b.hp / b.maxHp), 8);
  ctx.fillStyle = '#fff';
  ctx.font = '10px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('BOSS', b.x, b.y - 16);
  ctx.shadowBlur = 0;
}

// ── Input ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if (e.key === ' ' && state === 'playing') firePlayer();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('click', e => {
  if (state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  firePlayer(e.clientX - rect.left, e.clientY - rect.top);
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  firePlayer(t.clientX - rect.left, t.clientY - rect.top);
}, { passive: false });

document.getElementById('btnUp').addEventListener('mousedown', () => moveUp = true);
document.getElementById('btnUp').addEventListener('mouseup', () => moveUp = false);
document.getElementById('btnUp').addEventListener('mouseleave', () => moveUp = false);
document.getElementById('btnUp').addEventListener('touchstart', e => { e.preventDefault(); moveUp = true; });
document.getElementById('btnUp').addEventListener('touchend', e => { e.preventDefault(); moveUp = false; });
document.getElementById('btnDown').addEventListener('mousedown', () => moveDown = true);
document.getElementById('btnDown').addEventListener('mouseup', () => moveDown = false);
document.getElementById('btnDown').addEventListener('mouseleave', () => moveDown = false);
document.getElementById('btnDown').addEventListener('touchstart', e => { e.preventDefault(); moveDown = true; });
document.getElementById('btnDown').addEventListener('touchend', e => { e.preventDefault(); moveDown = false; });
document.getElementById('btnLeft').addEventListener('mousedown', () => moveLeft = true);
document.getElementById('btnLeft').addEventListener('mouseup', () => moveLeft = false);
document.getElementById('btnLeft').addEventListener('mouseleave', () => moveLeft = false);
document.getElementById('btnLeft').addEventListener('touchstart', e => { e.preventDefault(); moveLeft = true; });
document.getElementById('btnLeft').addEventListener('touchend', e => { e.preventDefault(); moveLeft = false; });
document.getElementById('btnRight').addEventListener('mousedown', () => moveRight = true);
document.getElementById('btnRight').addEventListener('mouseup', () => moveRight = false);
document.getElementById('btnRight').addEventListener('mouseleave', () => moveRight = false);
document.getElementById('btnRight').addEventListener('touchstart', e => { e.preventDefault(); moveRight = true; });
document.getElementById('btnRight').addEventListener('touchend', e => { e.preventDefault(); moveRight = false; });

startBtn.onclick = startGame;

// Start the loop (draws nothing while in menu)
requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(update); });
</script>
