<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TIC TAC TOE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Animated background particles */
    .bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .game-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 900;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #00f5ff, #bf00ff, #ff0080);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(0,245,255,0.4));
      animation: titlePulse 3s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(0,245,255,0.4)); }
      50%       { filter: drop-shadow(0 0 50px rgba(191,0,255,0.7)); }
    }

    /* Status bar */
    .status {
      font-size: clamp(1rem, 2.2vw, 1.6rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      min-height: 3rem;
      transition: all 0.3s ease;
    }
    .status.x-turn  { color: #00f5ff; text-shadow: 0 0 20px #00f5ff; }
    .status.o-turn  { color: #ff0080; text-shadow: 0 0 20px #ff0080; }
    .status.winner  { color: #ffe600; text-shadow: 0 0 30px #ffe600, 0 0 60px #ff8c00; animation: winnerFlash 0.5s ease-in-out infinite; }
    .status.draw    { color: #aaa; text-shadow: 0 0 20px #666; }

    @keyframes winnerFlash {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(1.05); }
    }

    /* Score board */
    .scores {
      display: flex;
      gap: 40px;
      align-items: center;
    }
    .score-box {
      text-align: center;
      padding: 8px 24px;
      border-radius: 16px;
      border: 2px solid;
      backdrop-filter: blur(10px);
      transition: transform 0.2s;
    }
    .score-box:hover { transform: scale(1.05); }
    .score-box.x {
      border-color: #00f5ff;
      background: rgba(0,245,255,0.07);
      box-shadow: 0 0 20px rgba(0,245,255,0.2);
    }
    .score-box.o {
      border-color: #ff0080;
      background: rgba(255,0,128,0.07);
      box-shadow: 0 0 20px rgba(255,0,128,0.2);
    }
    .score-box .label {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.7;
      color: #fff;
    }
    .score-box.x .value { font-size: 2rem; font-weight: 900; color: #00f5ff; line-height: 1; }
    .score-box.o .value { font-size: 2rem; font-weight: 900; color: #ff0080; line-height: 1; }

    .score-divider { font-size: 2rem; color: #444; font-weight: 300; }

    /* The board */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 20px;
      background: rgba(255,255,255,0.03);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      box-shadow: 0 0 80px rgba(0,0,0,0.6);
    }

    .cell {
      width:  clamp(80px, 16vw, 150px);
      height: clamp(80px, 16vh, 150px);
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      overflow: hidden;
    }

    .cell:hover:not(.taken) {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.3);
      transform: scale(1.04);
    }

    .cell.taken { cursor: default; }

    /* X symbol */
    .cell .sym {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 900;
      line-height: 1;
      user-select: none;
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .cell .sym.x {
      color: #00f5ff;
      text-shadow: 0 0 20px #00f5ff, 0 0 40px #00f5ff;
    }
    .cell .sym.o {
      color: #ff0080;
      text-shadow: 0 0 20px #ff0080, 0 0 40px #ff0080;
    }

    @keyframes popIn {
      0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg);   opacity: 1; }
    }

    /* Win highlight */
    .cell.win-cell {
      animation: winCellPulse 0.6s ease-in-out infinite;
      border-color: #ffe600 !important;
    }
    @keyframes winCellPulse {
      0%, 100% { background: rgba(255,230,0,0.08); box-shadow: inset 0 0 20px rgba(255,230,0,0.1); }
      50%       { background: rgba(255,230,0,0.18); box-shadow: inset 0 0 40px rgba(255,230,0,0.25), 0 0 30px rgba(255,230,0,0.3); }
    }

    /* Reset button */
    .reset-btn {
      margin-top: 8px;
      padding: 14px 48px;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(135deg, #00f5ff, #bf00ff);
      color: #000;
      box-shadow: 0 0 30px rgba(0,245,255,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .reset-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 0 50px rgba(191,0,255,0.6);
    }
    .reset-btn:active { transform: scale(0.97); }

    /* Draw restart overlay message */
    .draw-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 3rem;
      font-weight: 900;
      color: #fff;
      background: rgba(0,0,0,0.85);
      border-radius: 20px;
      padding: 20px 40px;
      text-align: center;
      z-index: 20;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
      white-space: nowrap;
    }
    .draw-msg.show { transform: translate(-50%, -50%) scale(1); }
  </style>
</head>
<body>

<canvas class="bg-canvas" id="bgCanvas"></canvas>

<div class="game-wrapper">
  <h1>Tic Tac Toe</h1>

  <div class="scores">
    <div class="score-box x">
      <div class="label">Player X</div>
      <div class="value" id="scoreX">0</div>
    </div>
    <div class="score-divider">vs</div>
    <div class="score-box o">
      <div class="label">Player O</div>
      <div class="value" id="scoreO">0</div>
    </div>
  </div>

  <div class="status x-turn" id="status">Player X's Turn</div>

  <div style="position:relative">
    <div class="board" id="board">
      <!-- 9 cells injected by JS -->
    </div>
    <div class="draw-msg" id="drawMsg">DRAW! Restarting...</div>
  </div>

  <button class="reset-btn" id="resetBtn">Reset Scores</button>
  <button id="wb-ttt-share" style="display:none;margin-top:12px;padding:10px 28px;background:linear-gradient(135deg,#f97316,#fbbf24);border:none;border-radius:10px;color:#fff;font-weight:800;font-size:.95rem;cursor:pointer;">⬆ Share Result</button>
  <button onclick="WackyShare.show('Tic Tac Toe','Play Tic Tac Toe — 2 player!','https://wackybrains.com/Tiktaktoe/')" style="margin-top:8px;padding:10px 28px;background:linear-gradient(135deg,#f97316,#fbbf24);border:none;border-radius:10px;color:#fff;font-weight:800;font-size:.95rem;cursor:pointer;">⬆ Share Game</button>
</div>

<script>
// ─── Background particle canvas ──────────────────────────────────────────────
const canvas = document.getElementById('bgCanvas');
const ctx    = canvas.getContext('2d');
let W, H;
const particles = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    r: Math.random() * 2 + 0.5,
    dx: (Math.random() - 0.5) * 0.4,
    dy: (Math.random() - 0.5) * 0.4,
    hue: Math.random() * 60 + 180   // cyan-purple range
  });
}

function drawBg() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    p.x += p.dx; p.y += p.dy;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    if (p.y > H) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, 0.6)`;
    ctx.fill();
  });
  requestAnimationFrame(drawBg);
}
drawBg();

// ─── Game logic ──────────────────────────────────────────────────────────────
const WINS = [
  [0,1,2],[3,4,5],[6,7,8],   // rows
  [0,3,6],[1,4,7],[2,5,8],   // cols
  [0,4,8],[2,4,6]            // diags
];

let board       = Array(9).fill(null);
let current     = 'X';
let gameOver    = false;
let scores      = { X: 0, O: 0 };

const boardEl   = document.getElementById('board');
const statusEl  = document.getElementById('status');
const scoreXEl  = document.getElementById('scoreX');
const scoreOEl  = document.getElementById('scoreO');
const drawMsgEl = document.getElementById('drawMsg');
const resetBtn  = document.getElementById('resetBtn');

// Build cells
const cells = [];
for (let i = 0; i < 9; i++) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.dataset.index = i;
  cell.addEventListener('click', () => handleClick(i));
  boardEl.appendChild(cell);
  cells.push(cell);
}

function handleClick(i) {
  if (gameOver || board[i]) return;

  board[i] = current;
  cells[i].innerHTML = `<span class="sym ${current.toLowerCase()}">${current === 'O' ? '0' : current}</span>`;
  cells[i].classList.add('taken');

  const winLine = checkWin();
  if (winLine) {
    winLine.forEach(idx => cells[idx].classList.add('win-cell'));
    scores[current]++;
    updateScores();
    const winner = current === 'O' ? '0' : current;
    setStatus(`Player ${winner} Wins! 🎉`, 'winner');
    gameOver = true;
    const _sb = document.getElementById('wb-ttt-share');
    if(_sb){ _sb.style.display='inline-block'; _sb.onclick=()=>WackyShare.show('Tic Tac Toe',`Player ${winner} won ${scores[current]}-${scores[current==='X'?'O':'X']} in Tic Tac Toe!`,'https://wackybrains.com/Tiktaktoe/'); }
    setTimeout(()=>{ if(_sb)_sb.style.display='none'; newGame(); }, 2200);
  } else if (board.every(Boolean)) {
    // Draw — auto restart
    setStatus('Draw!', 'draw');
    gameOver = true;
    drawMsgEl.classList.add('show');
    setTimeout(() => {
      drawMsgEl.classList.remove('show');
      newGame();
    }, 1800);
  } else {
    current = current === 'X' ? 'O' : 'X';
    setStatus(`Player ${current === 'O' ? '0' : current}'s Turn`, current === 'X' ? 'x-turn' : 'o-turn');
  }
}

function checkWin() {
  for (const line of WINS) {
    const [a, b, c] = line;
    if (board[a] && board[a] === board[b] && board[a] === board[c]) return line;
  }
  return null;
}

function newGame() {
  board    = Array(9).fill(null);
  gameOver = false;
  current  = 'X';
  cells.forEach(c => {
    c.innerHTML = '';
    c.className = 'cell';
  });
  setStatus("Player X's Turn", 'x-turn');
}

function setStatus(msg, cls) {
  statusEl.textContent = msg;
  statusEl.className   = 'status ' + cls;
}

function updateScores() {
  scoreXEl.textContent = scores.X;
  scoreOEl.textContent = scores.O;
}

resetBtn.addEventListener('click', () => {
  scores = { X: 0, O: 0 };
  updateScores();
  newGame();
});
</script>
<script src="/share-widget.js"></script>
</body>
</html>
