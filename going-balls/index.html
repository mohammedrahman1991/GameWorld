<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Going Balls</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05001a;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;height:100vh;width:100vw}
#gl{display:block;position:fixed;inset:0}

/* ── UI overlay ── */
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
        justify-content:center;gap:18px;pointer-events:all;
        background:linear-gradient(160deg,#05001a 0%,#0e0535 60%,#1a0545 100%)}
.screen.hidden{display:none}

/* Grid lines */
.screen::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(120,60,220,0.07) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(120,60,220,0.07) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none}

h1.logo{font-size:clamp(2.8rem,8vw,5.5rem);font-weight:900;letter-spacing:-2px;text-align:center;
        background:linear-gradient(135deg,#a855f7,#f97316);-webkit-background-clip:text;
        -webkit-text-fill-color:transparent;background-clip:text;
        filter:drop-shadow(0 0 30px rgba(168,85,247,0.6))}
h1.logo span{background:linear-gradient(135deg,#f97316,#fbbf24);-webkit-background-clip:text;background-clip:text}

.subtitle{color:rgba(255,255,255,0.45);font-size:.95rem;letter-spacing:.06em}
.coin-badge{background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.3);
            border-radius:99px;padding:8px 22px;color:#fbbf24;font-weight:700;font-size:1rem}

/* Buttons */
.btn{padding:14px 40px;border:none;border-radius:14px;font-size:1rem;font-weight:800;
     cursor:pointer;transition:.18s;letter-spacing:.04em;min-width:220px;text-align:center}
.btn:hover{transform:translateY(-3px);filter:brightness(1.15)}
.btn:active{transform:scale(.97)}
.btn-orange{background:linear-gradient(135deg,#f97316,#fbbf24);color:#fff;
            box-shadow:0 6px 28px rgba(249,115,22,.45)}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;
            box-shadow:0 6px 28px rgba(124,58,237,.45)}
.btn-green{background:linear-gradient(135deg,#059669,#10b981);color:#fff;
           box-shadow:0 6px 28px rgba(16,185,129,.35)}
.btn-gray{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);color:#fff}
.btn-sm{padding:11px 28px;font-size:.88rem;min-width:140px}

.btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

/* Controls hint */
.controls{color:rgba(255,255,255,0.35);font-size:.8rem;text-align:center;line-height:1.7}
kbd{background:rgba(255,255,255,.12);border-radius:5px;padding:1px 7px;font-size:.78rem}

/* Level complete */
.stars{font-size:2.2rem;letter-spacing:6px}
.result{color:rgba(255,255,255,.7);font-size:1rem;text-align:center;line-height:1.8}
.result b{color:#fbbf24}

/* Shop */
#shop-screen{overflow-y:auto;justify-content:flex-start;padding:70px 20px 80px}
#shop-inner{width:100%;max-width:760px;margin:0 auto}
#shop-header{text-align:center;margin-bottom:24px}
#shop-header h2{color:#fff;font-size:1.6rem;font-weight:900;margin-bottom:8px}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.ball-card{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);
           border-radius:14px;padding:16px 10px 12px;text-align:center;cursor:pointer;
           transition:.2s;display:flex;flex-direction:column;align-items:center;gap:8px}
.ball-card:hover{border-color:rgba(168,85,247,.5);background:rgba(168,85,247,.1)}
.ball-card.owned{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.08)}
.ball-card.selected{border-color:#f97316;background:rgba(249,115,22,.15);
                    box-shadow:0 0 18px rgba(249,115,22,.3)}
.ball-preview{width:52px;height:52px;border-radius:50%;margin:0 auto}
.ball-card .bname{font-size:.78rem;font-weight:700;color:#fff}
.ball-card .bprice{font-size:.72rem;font-weight:600}
.ball-card .bprice.cant{color:#ef4444}
.ball-card .bprice.can{color:#fbbf24}
.ball-card .bprice.own{color:#10b981}
#shop-back{position:fixed;bottom:18px;left:50%;transform:translateX(-50%)}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;
     align-items:center;padding:12px 20px;pointer-events:none}
#hud-left{background:rgba(0,0,0,.55);border-radius:12px;padding:8px 18px;
          color:#fff;font-weight:700;font-size:.92rem;backdrop-filter:blur(4px)}
#progress-bar{position:fixed;bottom:0;left:0;right:0;height:6px;background:rgba(255,255,255,.1)}
#progress-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#f97316);width:0;transition:.1s}
#p2-hud{position:fixed;top:0;right:0;background:rgba(0,0,0,.55);border-radius:0 0 0 12px;
        padding:8px 14px;color:#fff;font-size:.82rem;font-weight:700;display:none}
</style>
</head>
<body>
<canvas id="gl"></canvas>

<!-- ── UI ── -->
<div id="ui">

  <!-- TITLE -->
  <div class="screen" id="title-screen">
    <h1 class="logo">GOING<br><span>BALLS</span></h1>
    <div class="subtitle">30 LEVELS · 20 BALLS · 1 & 2 PLAYER</div>
    <div class="coin-badge" id="title-coins">🪙 0 coins</div>
    <button class="btn btn-orange" id="btn-1p">▶ 1 PLAYER</button>
    <button class="btn btn-purple" id="btn-2p">👥 2 PLAYERS</button>
    <button class="btn btn-green btn-sm" id="btn-shop-title">🛒 Ball Shop</button>
    <div class="controls">
      Steer Left: <kbd>←</kbd> <kbd>A</kbd> &nbsp;·&nbsp; Steer Right: <kbd>→</kbd> <kbd>D</kbd>
    </div>
  </div>

  <!-- LEVEL COMPLETE -->
  <div class="screen hidden" id="complete-screen">
    <h1 class="logo" id="result-title" style="font-size:clamp(1.8rem,5vw,3rem)">LEVEL CLEAR!</h1>
    <div class="stars" id="result-stars">⭐⭐⭐</div>
    <div class="result" id="result-text"></div>
    <div class="btn-row">
      <button class="btn btn-gray btn-sm" id="btn-menu">🏠 Menu</button>
      <button class="btn btn-green btn-sm" id="btn-shop-done">🛒 Shop</button>
      <button class="btn btn-orange btn-sm" id="btn-next">Next ▶</button>
    </div>
    <div id="level-num" style="color:rgba(255,255,255,.3);font-size:.8rem"></div>
  </div>

  <!-- SHOP -->
  <div class="screen hidden" id="shop-screen">
    <div id="shop-inner">
      <div id="shop-header">
        <h2>🛒 Ball Shop</h2>
        <div class="coin-badge" id="shop-coins">🪙 0 coins</div>
      </div>
      <div class="shop-grid" id="shop-grid"></div>
    </div>
    <button class="btn btn-gray btn-sm" id="shop-back">← Back</button>
  </div>

  <!-- HUD (shown while playing) -->
  <div id="hud" style="display:none">
    <div id="hud-left">Lv <span id="hud-level">1</span> &nbsp;🪙 <span id="hud-coins">0</span></div>
  </div>
  <div id="p2-hud">P2 🪙 <span id="hud-coins2">0</span></div>
  <div id="progress-bar"><div id="progress-fill"></div></div>

</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
//  SKINS
// ═══════════════════════════════════════════════════════════════
const SKINS=[
  {name:'Classic',   hex:'#e74c3c',price:0},
  {name:'Ocean',     hex:'#1565c0',price:50},
  {name:'Emerald',   hex:'#1b5e20',price:50},
  {name:'Sunshine',  hex:'#e65100',price:75},
  {name:'Grape',     hex:'#6a1b9a',price:100},
  {name:'Hot Pink',  hex:'#ad1457',price:100},
  {name:'Ice',       hex:'#4fc3f7',price:150},
  {name:'Shadow',    hex:'#212121',price:150},
  {name:'Gold',      hex:'#c79100',price:200},
  {name:'Rainbow',   hex:'#e91e63',price:200},
  {name:'Fireball',  hex:'#bf360c',price:250},
  {name:'Frost',     hex:'#80deea',price:250},
  {name:'Lava',      hex:'#7f0000',price:300},
  {name:'Galaxy',    hex:'#4a148c',price:300},
  {name:'Neon',      hex:'#33691e',price:300},
  {name:'Electric',  hex:'#01579b',price:350},
  {name:'Rose Gold', hex:'#880e4f',price:350},
  {name:'Inferno',   hex:'#621a15',price:400},
  {name:'Diamond',   hex:'#80cbc4',price:450},
  {name:'Crown',     hex:'#f57f17',price:500},
];

// ═══════════════════════════════════════════════════════════════
//  SAVE
// ═══════════════════════════════════════════════════════════════
let save=(()=>{try{const s=JSON.parse(localStorage.getItem('gb3')||'{}');
  return{coins:s.coins||0,owned:s.owned||[0],sel:s.sel||0,best:s.best||1};}
  catch(e){return{coins:0,owned:[0],sel:0,best:1};}})();
function persist(){localStorage.setItem('gb3',JSON.stringify(save));}

// ═══════════════════════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════════════════════
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('gl'),antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x05001a);
scene.fog=new THREE.FogExp2(0x0e0535, 0.018);

const camera=new THREE.PerspectiveCamera(70,1,0.1,400);

// Lights
const ambient=new THREE.AmbientLight(0x8060ff,1.5);
scene.add(ambient);
const sun=new THREE.DirectionalLight(0xffffff,3);
sun.position.set(10,20,10);
sun.castShadow=true;
sun.shadow.mapSize.width=2048;
sun.shadow.mapSize.height=2048;
sun.shadow.camera.far=200;
sun.shadow.camera.left=-60;
sun.shadow.camera.right=60;
sun.shadow.camera.top=60;
sun.shadow.camera.bottom=-60;
scene.add(sun);
const hemi=new THREE.HemisphereLight(0x7040ff,0x000020,1.2);
scene.add(hemi);

function onResize(){
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
}
onResize();
window.addEventListener('resize',onResize);

// ═══════════════════════════════════════════════════════════════
//  LEVEL GENERATOR
// ═══════════════════════════════════════════════════════════════
function mkRand(seed){let s=seed;return()=>{s=(s*9301+49297)%233280;return s/233280;};}

function lerp2(wp,z){
  for(let i=0;i<wp.length-1;i++){
    if(z>=wp[i].z&&z<=wp[i+1].z){
      const t=(z-wp[i].z)/(wp[i+1].z-wp[i].z);
      return wp[i].x+t*(wp[i+1].x-wp[i].x);
    }
  }
  return wp[wp.length-1].x;
}

function genLevel(lvl){
  const r=mkRand(lvl*137+11);
  const d=(lvl-1)/29;
  return{
    spd:14+d*12,
    hw:3.8-d*1.2,
    nWP:10+Math.floor(d*18),
    turnStr:d*3.5,
    nCoins:8+Math.floor(d*14),
    nBarrels:2+Math.floor(d*12),
    d,
  };
}

// ═══════════════════════════════════════════════════════════════
//  SCENE OBJECTS
// ═══════════════════════════════════════════════════════════════
let pathMeshes=[], coinMeshes=[], barrelMeshes=[], trampMesh=null;
let ballMesh, ball2Mesh;
let waypoints=[], hw_world=3.8, totalZ=0;
let levelCfg=null;

const PATH_Y = 0;  // top surface of path tiles
const BALL_RADIUS = 0.55;

// Reusable materials
const pathMat = new THREE.MeshStandardMaterial({
  color:0x2d1b69, emissive:0x1a0a40, emissiveIntensity:0.6,
  roughness:0.5, metalness:0.4
});
const pathEdgeMat = new THREE.MeshStandardMaterial({
  color:0xa855f7, emissive:0xa855f7, emissiveIntensity:1.5,
  roughness:0.3
});
const coinMat = new THREE.MeshStandardMaterial({
  color:0xFFD700, emissive:0xffa000, emissiveIntensity:0.8,
  metalness:0.9, roughness:0.1
});
const barrelMat = new THREE.MeshStandardMaterial({color:0x8B4513,roughness:0.8,metalness:0.1});
const barrelRingMat = new THREE.MeshStandardMaterial({color:0x888888,roughness:0.5,metalness:0.6});
const trampMat = new THREE.MeshStandardMaterial({
  color:0xff6f00, emissive:0xff3d00, emissiveIntensity:0.5,
  roughness:0.4
});

function clearScene(){
  [...pathMeshes,...coinMeshes,...barrelMeshes].forEach(m=>scene.remove(m));
  if(trampMesh) scene.remove(trampMesh);
  pathMeshes=[]; coinMeshes=[]; barrelMeshes=[]; trampMesh=null;
}

function makeBallMesh(skinIdx){
  const col = new THREE.Color(SKINS[skinIdx].hex);
  const mat = new THREE.MeshStandardMaterial({
    color:col, emissive:col, emissiveIntensity:0.15,
    metalness:0.5, roughness:0.25,
  });
  const geo = new THREE.SphereGeometry(BALL_RADIUS,32,32);
  const m   = new THREE.Mesh(geo, mat);
  m.castShadow=true;
  return m;
}

function buildScene(lvl){
  clearScene();
  levelCfg=genLevel(lvl);
  const r=mkRand(lvl*137+11);
  const {d,nWP,turnStr,nCoins,nBarrels,hw}=levelCfg;
  hw_world=hw;

  // Waypoints
  waypoints=[{x:0,z:0}];
  let cx=0;
  for(let i=1;i<=nWP;i++){
    cx+=(r()-0.5)*turnStr*8;
    cx=Math.max(-12,Math.min(12,cx));
    waypoints.push({x:cx,z:i*12});
  }
  totalZ=waypoints[waypoints.length-1].z;

  // Path tiles — one per waypoint segment
  for(let i=0;i<waypoints.length-1;i++){
    const A=waypoints[i], B=waypoints[i+1];
    const dx=B.x-A.x, dz=B.z-A.z;
    const len=Math.sqrt(dx*dx+dz*dz);
    const angle=Math.atan2(dx,dz);
    const mx=(A.x+B.x)/2, mz=(A.z+B.z)/2;

    // Main surface
    const geo=new THREE.BoxGeometry(hw*2,0.4,len+0.3);
    const mesh=new THREE.Mesh(geo, pathMat.clone());
    // Alternate tile shading
    if(i%2===0){ mesh.material.emissive.set(0x1a0a50); mesh.material.emissiveIntensity=0.7; }
    mesh.position.set(mx, PATH_Y-0.2, mz);
    mesh.rotation.y=-angle;
    mesh.receiveShadow=true;
    scene.add(mesh);
    pathMeshes.push(mesh);

    // Neon edge strips
    const edgeGeo=new THREE.BoxGeometry(0.12,0.08,len+0.3);
    [-hw,hw].forEach(ex=>{
      const em=new THREE.Mesh(edgeGeo,pathEdgeMat);
      em.position.set(mx+Math.cos(angle)*(-ex),PATH_Y+0.02,mz);
      // rotate edge
      const emx=ex*Math.cos(-angle), emz=ex*Math.sin(-angle);
      em.position.set(mx+emx, PATH_Y+0.02, mz+emz);
      em.rotation.y=-angle;
      scene.add(em);
      pathMeshes.push(em);
    });
  }

  // Coins (floating torus rings)
  const coinGeo=new THREE.TorusGeometry(0.35,0.12,16,24);
  for(let i=0;i<nCoins;i++){
    const z=8+r()*(totalZ-16);
    const px=lerp2(waypoints,z);
    const x=px+(r()-0.5)*hw*0.6;
    const mesh=new THREE.Mesh(coinGeo,coinMat.clone());
    mesh.position.set(x, PATH_Y+1.1, z);
    mesh.rotation.x=Math.PI/2;
    mesh.castShadow=false;
    scene.add(mesh);
    coinMeshes.push({mesh,x,z,collected:false});
  }

  // Barrels (cylinders)
  const bGeo=new THREE.CylinderGeometry(0.5,0.5,1.2,16);
  const bRing=new THREE.TorusGeometry(0.5,0.07,8,16);
  for(let i=0;i<nBarrels;i++){
    const z=15+r()*(totalZ-22);
    const px=lerp2(waypoints,z);
    const x=px+(r()-0.5)*hw*0.55;
    const grp=new THREE.Group();
    const body=new THREE.Mesh(bGeo,barrelMat.clone());
    body.castShadow=true;
    grp.add(body);
    // Rings
    [-0.3,0.3].forEach(dy=>{
      const ring=new THREE.Mesh(bRing,barrelRingMat.clone());
      ring.position.y=dy;
      ring.rotation.x=Math.PI/2;
      grp.add(ring);
    });
    grp.position.set(x, PATH_Y+0.6, z);
    scene.add(grp);
    barrelMeshes.push({grp,x,z,hit:false,velX:0,velY:0,rotV:0});
  }

  // Trampoline
  const trampGeo=new THREE.BoxGeometry(hw*2,0.25,3.5);
  trampMesh=new THREE.Mesh(trampGeo,trampMat);
  trampMesh.position.set(lerp2(waypoints,totalZ), PATH_Y+0.12, totalZ);
  scene.add(trampMesh);

  // Ball(s)
  if(ballMesh) scene.remove(ballMesh);
  if(ball2Mesh) scene.remove(ball2Mesh);
  ballMesh=makeBallMesh(save.sel);
  ballMesh.position.set(0, PATH_Y+BALL_RADIUS, 0);
  scene.add(ballMesh);
  if(numPlayers===2){
    ball2Mesh=makeBallMesh(save.sel);
    ball2Mesh.position.set(0, PATH_Y+BALL_RADIUS, 0);
    scene.add(ball2Mesh);
  }
}

// ═══════════════════════════════════════════════════════════════
//  KEYS
// ═══════════════════════════════════════════════════════════════
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code))e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

// ═══════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════
let gameScreen='title'; // title|playing|complete|shop
let numPlayers=1;
let curLevel=1;
let shopFrom='title';

function mkPS(idx){
  return{idx,camZ:0,ballX:0,velX:0,ballY:PATH_Y+BALL_RADIUS,velY:0,
         grounded:true,alive:true,done:false,coins:0,
         bounceT:0, deadT:0, spinAngle:0};
}
let ps=[]; // player states

// ═══════════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════════
function showScreen(id){
  ['title-screen','complete-screen','shop-screen'].forEach(s=>{
    document.getElementById(s).classList.toggle('hidden',s!==id);
  });
  document.getElementById('hud').style.display = id===null?'flex':'none';
  document.getElementById('progress-bar').style.display = id===null?'block':'none';
  document.getElementById('p2-hud').style.display = (id===null&&numPlayers===2)?'block':'none';
  if(id===null){ // playing
    document.getElementById('hud').style.display='flex';
    document.getElementById('progress-bar').style.display='block';
  }
}

function updateHUD(){
  if(gameScreen!=='playing') return;
  const p=ps[0];
  document.getElementById('hud-level').textContent=curLevel;
  document.getElementById('hud-coins').textContent=save.coins+p.coins;
  document.getElementById('progress-fill').style.width=(Math.min(1,p.camZ/totalZ)*100)+'%';
  if(numPlayers===2){
    document.getElementById('hud-coins2').textContent=save.coins+(ps[1]?.coins||0);
  }
}

// ═══════════════════════════════════════════════════════════════
//  SHOP UI
// ═══════════════════════════════════════════════════════════════
function buildShop(){
  const grid=document.getElementById('shop-grid');
  grid.innerHTML='';
  document.getElementById('shop-coins').textContent=`🪙 ${save.coins} coins`;
  SKINS.forEach((sk,i)=>{
    const card=document.createElement('div');
    card.className='ball-card'+(save.owned.includes(i)?' owned':'')+(save.sel===i?' selected':'');
    const preview=document.createElement('div');
    preview.className='ball-preview';
    preview.style.background=`radial-gradient(circle at 35% 35%,${lightenHex(sk.hex,60)},${sk.hex},#000)`;
    card.appendChild(preview);
    const nm=document.createElement('div'); nm.className='bname'; nm.textContent=sk.name;
    card.appendChild(nm);
    const pr=document.createElement('div');
    if(save.sel===i){ pr.className='bprice own'; pr.textContent='✓ SELECTED'; }
    else if(save.owned.includes(i)){ pr.className='bprice own'; pr.textContent='✓ OWNED'; }
    else if(save.coins>=sk.price){ pr.className='bprice can'; pr.textContent=`🪙 ${sk.price}`; }
    else{ pr.className='bprice cant'; pr.textContent=`🪙 ${sk.price}`; }
    card.appendChild(pr);
    card.addEventListener('click',()=>{
      if(save.owned.includes(i)){ save.sel=i; persist(); buildShop(); }
      else if(save.coins>=sk.price){
        save.coins-=sk.price; save.owned.push(i); save.sel=i; persist(); buildShop();
      }
    });
    grid.appendChild(card);
  });
}

function lightenHex(hex,amt){
  const n=parseInt(hex.slice(1),16);
  const r=Math.min(255,(n>>16)+amt);
  const g=Math.min(255,((n>>8)&0xff)+amt);
  const b=Math.min(255,(n&0xff)+amt);
  return `rgb(${r},${g},${b})`;
}

// ═══════════════════════════════════════════════════════════════
//  BUTTON WIRING
// ═══════════════════════════════════════════════════════════════
document.getElementById('btn-1p').onclick=()=>startGame(1);
document.getElementById('btn-2p').onclick=()=>startGame(2);
document.getElementById('btn-shop-title').onclick=()=>{shopFrom='title';buildShop();showScreen('shop-screen');gameScreen='shop';};
document.getElementById('shop-back').onclick=()=>{
  if(shopFrom==='complete'){ showScreen('complete-screen'); gameScreen='complete'; }
  else{ showScreen('title-screen'); gameScreen='title'; }
};
document.getElementById('btn-menu').onclick=()=>{ showScreen('title-screen'); gameScreen='title'; };
document.getElementById('btn-shop-done').onclick=()=>{ shopFrom='complete'; buildShop(); showScreen('shop-screen'); gameScreen='shop'; };
document.getElementById('btn-next').onclick=()=>{
  const anyDone=ps.some(p=>p.done);
  if(anyDone&&curLevel<30){ curLevel++; startGame(numPlayers); }
  else if(anyDone&&curLevel===30){ curLevel=1; showScreen('title-screen'); gameScreen='title'; }
  else startGame(numPlayers); // retry
};

// ═══════════════════════════════════════════════════════════════
//  START GAME
// ═══════════════════════════════════════════════════════════════
function startGame(np){
  numPlayers=np;
  ps=[];
  for(let i=0;i<np;i++) ps.push(mkPS(i));
  buildScene(curLevel);
  gameScreen='playing';
  showScreen(null);
  document.getElementById('title-coins').textContent=`🪙 ${save.coins} coins`;
}

// ═══════════════════════════════════════════════════════════════
//  LEVEL COMPLETE
// ═══════════════════════════════════════════════════════════════
function showComplete(){
  gameScreen='complete';
  const anyDone=ps.some(p=>p.done);
  const totalCoins=ps.reduce((s,p)=>s+p.coins,0);
  const maxCoins=levelCfg.nCoins;
  const stars=totalCoins>=maxCoins?3:totalCoins>=maxCoins*0.6?2:1;

  document.getElementById('result-title').textContent=anyDone?'🎉 LEVEL CLEAR!':'💀 YOU FELL OFF!';
  document.getElementById('result-stars').textContent=anyDone?'⭐'.repeat(stars)+'☆'.repeat(3-stars):'';
  document.getElementById('result-text').innerHTML=anyDone
    ? `Coins: <b>🪙 ${totalCoins} / ${maxCoins}</b><br>Total: <b>🪙 ${save.coins}</b>`
    : `Better luck next time!<br>Total: <b>🪙 ${save.coins}</b>`;

  const btn=document.getElementById('btn-next');
  if(!anyDone){ btn.textContent='↺ Retry'; }
  else if(curLevel>=30){ btn.textContent='🏆 Complete!'; }
  else{ btn.textContent=`Level ${curLevel+1} ▶`; }

  document.getElementById('level-num').textContent=`Level ${curLevel} / 30  ·  Best: ${save.best}`;
  showScreen('complete-screen');
}

// ═══════════════════════════════════════════════════════════════
//  PLAYER UPDATE
// ═══════════════════════════════════════════════════════════════
function updatePS(p, dt, mesh){
  if(!p.alive&&!p.done) { p.deadT+=dt; return; }
  if(p.done) { p.bounceT+=dt*2; return; }

  // Forward
  p.camZ += levelCfg.spd * dt;

  // Steer
  const left  = numPlayers===1?(keys['ArrowLeft']||keys['KeyA']) : p.idx===0?keys['KeyA']:keys['ArrowLeft'];
  const right = numPlayers===1?(keys['ArrowRight']||keys['KeyD']): p.idx===0?keys['KeyD']:keys['ArrowRight'];
  const ACCEL=90*dt, MAX_VEL=20, FRIC=0.72;
  if(left)  p.velX-=ACCEL;
  if(right) p.velX+=ACCEL;
  p.velX*=FRIC;
  p.velX=Math.max(-MAX_VEL,Math.min(MAX_VEL,p.velX));
  p.ballX+=p.velX*dt;

  // Spin ball visually
  p.spinAngle+=levelCfg.spd*dt*1.5;
  if(mesh){ mesh.rotation.x=-p.spinAngle; mesh.rotation.z=-p.velX*0.05; }

  // Path tracking
  const pathCx=lerp2(waypoints,p.camZ);
  const worldX=pathCx+p.ballX;

  // Gravity + grounded
  if(p.grounded){
    p.ballY=PATH_Y+BALL_RADIUS;
    p.velY=0;
  } else {
    p.velY-=25*dt;
    p.ballY+=p.velY*dt;
  }

  // Check if on path
  if(Math.abs(p.ballX)>hw_world+0.6){
    p.grounded=false;
    if(!p.alive) return;
    if(p.ballY < PATH_Y-8){
      p.alive=false;
      save.coins+=p.coins;
      persist();
    }
  } else {
    p.grounded=true;
  }

  // Soft push from edges
  if(Math.abs(p.ballX)>hw_world*0.82) p.velX-=Math.sign(p.ballX)*12*dt;

  // Mesh position
  if(mesh){
    mesh.position.set(worldX, p.ballY, p.camZ);
  }

  // Coin collection
  for(const c of coinMeshes){
    if(c.collected) continue;
    const dx=c.x-worldX, dz=c.z-p.camZ;
    if(Math.abs(dx)<1.5&&Math.abs(dz)<2){
      c.collected=true;
      c.mesh.visible=false;
      p.coins++;
    }
  }

  // Barrel collision
  for(const b of barrelMeshes){
    if(b.hit) continue;
    const dx=b.x-worldX, dz=b.z-p.camZ;
    if(Math.abs(dx)<1.5&&Math.abs(dz)<2){
      b.hit=true;
      b.velX=(p.ballX>0?1:-1)*8;
      b.velY=6;
      b.rotV=(Math.random()-0.5)*10;
      p.velX*=-0.4;
    }
  }
  // Animate hit barrels
  for(const b of barrelMeshes){
    if(!b.hit) continue;
    b.velY-=20*dt;
    b.grp.position.x+=b.velX*dt;
    b.grp.position.y+=b.velY*dt;
    b.grp.rotation.z+=b.rotV*dt;
  }

  // Trampoline
  if(p.camZ>=totalZ-4&&!p.done){
    p.done=true;
    save.coins+=p.coins;
    if(curLevel>save.best){ save.best=curLevel; }
    persist();
    p.velX=0;
  }
}

// ═══════════════════════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════════════════════
function updateCamera(dt){
  if(!ps.length) return;
  const p=ps[0];
  const pathCx=lerp2(waypoints,p.camZ);
  const worldX=pathCx+p.ballX;

  // Camera follows: behind+above ball
  const CAM_DIST=8, CAM_HEIGHT=5, CAM_LOOK=6;
  const tX=worldX-p.velX*0.08;  // slight lag for feel
  const tY=p.ballY+CAM_HEIGHT;
  const tZ=p.camZ-CAM_DIST;
  // Smooth lerp
  camera.position.x+=(tX-camera.position.x)*Math.min(1,dt*8);
  camera.position.y+=(tY-camera.position.y)*Math.min(1,dt*6);
  camera.position.z+=(tZ-camera.position.z)*Math.min(1,dt*8);
  camera.lookAt(worldX, p.ballY+0.5, p.camZ+CAM_LOOK);

  // Move sun with camera
  sun.position.set(camera.position.x+10, camera.position.y+20, camera.position.z+10);
  sun.target.position.set(worldX,0,p.camZ);
  sun.target.updateMatrixWorld();
}

// ═══════════════════════════════════════════════════════════════
//  ANIMATE SCENE
// ═══════════════════════════════════════════════════════════════
const clock=new THREE.Clock();
let doneCheckT=0;

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);

  // Rotate coins
  coinMeshes.forEach(c=>{ if(!c.collected) c.mesh.rotation.z+=dt*2.5; });

  // Trampoline pulse
  if(trampMesh){
    const t=performance.now()*0.003;
    trampMesh.material.emissiveIntensity=0.4+Math.sin(t*3)*0.3;
  }

  if(gameScreen==='playing'){
    updatePS(ps[0], dt, ballMesh);
    if(numPlayers===2) updatePS(ps[1], dt, ball2Mesh);
    updateCamera(dt);
    updateHUD();

    // Bounce animation for done players
    if(ps[0].done && ps[0].bounceT>0 && ps[0].bounceT<1 && ballMesh){
      const by=Math.sin(ps[0].bounceT*Math.PI)*8;
      ballMesh.position.y=PATH_Y+BALL_RADIUS+by;
    }

    // Check if all over
    const allOver=ps.every(p=>p.done||(p.deadT>1.8));
    if(allOver){
      doneCheckT+=dt;
      if(doneCheckT>0.6){ doneCheckT=0; showComplete(); }
    } else {
      doneCheckT=0;
    }

    // Dead fall
    if(!ps[0].alive && ballMesh){
      ballMesh.position.y=ps[0].ballY;
    }
  }

  renderer.render(scene,camera);
}

scene.add(titleBall);
function titleLoop(){
  if(gameScreen!=='title'&&gameScreen!=='shop'&&gameScreen!=='complete'){
    scene.remove(titleBall); return;
  }
  requestAnimationFrame(titleLoop);
  titleBall.rotation.y+=0.01;
  titleBall.rotation.x+=0.008;
  renderer.render(scene,camera);
}
titleLoop();
animate();
</script>
