<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Swing Hero</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay" class="hidden">
      <div id="overlay-content"></div>
    </div>
  </div>
  <button id="wb-sw-share" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 32px;background:linear-gradient(135deg,#f97316,#fbbf24);border:none;border-radius:12px;color:#fff;font-size:1rem;font-weight:800;cursor:pointer;z-index:999;">⬆ Share Score</button>
  <script src="js/game.js"></script>
  <script src="/share-widget.js"></script>
  <button onclick="WackyShare.show('Swing Hero','Play Swing Hero!','https://wackybrains.com/Swing Man/')" style="position:fixed;top:14px;right:14px;z-index:9999;background:linear-gradient(135deg,#f97316,#fbbf24);border:none;border-radius:12px;color:#fff;cursor:pointer;font-size:.82rem;font-weight:700;padding:10px 18px;box-shadow:0 4px 12px rgba(249,115,22,0.4);">⬆ Share</button>
</body>
</html>
