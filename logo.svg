<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="98" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <ellipse cx="100" cy="65" rx="70" ry="45" fill="url(#shine)"/>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

  <!-- Brain shape -->
  <g transform="translate(100,92)" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left hemisphere -->
    <path d="M-4,-28 C-18,-28 -34,-20 -36,-6 C-38,6 -30,14 -28,20 C-26,28 -20,34 -12,34 L-4,34"/>
    <!-- Right hemisphere -->
    <path d="M4,-28 C18,-28 34,-20 36,-6 C38,6 30,14 28,20 C26,28 20,34 12,34 L4,34"/>
    <!-- Center split -->
    <line x1="-4" y1="-28" x2="-4" y2="34"/>
    <line x1="4" y1="-28" x2="4" y2="34"/>
    <!-- Brain folds left -->
    <path d="M-36,-6 C-28,-10 -24,-2 -30,4"/>
    <path d="M-34,12 C-24,8 -20,18 -28,22"/>
    <!-- Brain folds right -->
    <path d="M36,-6 C28,-10 24,-2 30,4"/>
    <path d="M34,12 C24,8 20,18 28,22"/>
  </g>

  <!-- Lightning bolt -->
  <g transform="translate(100,95)">
    <polygon points="4,-38 -8,-2 2,-2 -4,22 14,-14 3,-14 10,-38" fill="#facc15" stroke="#f59e0b" stroke-width="1.5" stroke-linejoin="round"/>
  </g>

  <!-- Stars -->
  <circle cx="38" cy="44" r="3" fill="#facc15" opacity="0.9"/>
  <circle cx="162" cy="52" r="2" fill="#fb7185" opacity="0.9"/>
  <circle cx="155" cy="158" r="3" fill="#34d399" opacity="0.9"/>
  <circle cx="42" cy="162" r="2" fill="#60a5fa" opacity="0.9"/>
  <circle cx="170" cy="100" r="2" fill="#facc15" opacity="0.7"/>
  <circle cx="30" cy="100" r="2" fill="#fb7185" opacity="0.7"/>

  <!-- WB text -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="18" fill="white" letter-spacing="3" opacity="0.95">WACKYBRAINS</text>
</svg>
