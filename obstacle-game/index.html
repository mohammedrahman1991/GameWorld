<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>Obstacle Game</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#000;overflow:hidden;font-family:monospace;}
    #c{display:block;width:100vw;height:100vh;background:#87CEEB;}

    /* HUD */
    #hud{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10;}
    #title-badge{position:fixed;top:14px;left:50%;transform:translateX(-50%);
      font:900 26px monospace;color:#FFD700;text-shadow:0 0 12px #FF8800,0 2px 0 #000;
      letter-spacing:3px;pointer-events:none;}
    #coins-hud{position:fixed;top:14px;left:18px;background:rgba(0,0,0,0.7);
      color:#FFD700;font:bold 18px monospace;padding:7px 14px;border-radius:16px;
      border:2px solid #FFD700;}
    #cp-hud{position:fixed;top:14px;right:18px;background:rgba(0,0,0,0.7);
      color:#88FFAA;font:bold 15px monospace;padding:7px 14px;border-radius:16px;
      border:1px solid #44AA66;}
    #sprint-hud{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
      background:rgba(255,140,0,0.85);color:#fff;font:bold 15px monospace;
      padding:6px 18px;border-radius:12px;display:none;}
    #hint-hud{position:fixed;top:60px;left:50%;transform:translateX(-50%);
      color:#fff;font:bold 16px monospace;text-shadow:0 1px 4px #000;
      pointer-events:none;text-align:center;}
    #lives-hud{position:fixed;top:56px;left:18px;background:rgba(0,0,0,0.7);
      color:#FF4444;font:bold 17px monospace;padding:6px 13px;border-radius:14px;
      border:1px solid #CC2222;}
    #timer-hud{position:fixed;top:56px;right:18px;background:rgba(0,0,0,0.7);
      color:#AAFFDD;font:bold 15px monospace;padding:6px 13px;border-radius:14px;
      border:1px solid #44AAAA;}
    #section-hud{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,0.65);color:#AAD4FF;font:bold 13px monospace;
      padding:5px 14px;border-radius:10px;pointer-events:none;}
    /* Section announcement */
    #sec-announce{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);
      font:900 44px monospace;color:#FFD700;text-shadow:0 0 20px #FF8800,0 3px 0 #000;
      pointer-events:none;opacity:0;transition:opacity 0.5s;letter-spacing:3px;
      text-align:center;z-index:30;}
    /* Game over */
    #over-modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);
      display:none;align-items:center;justify-content:center;z-index:100;}
    #over-modal.open{display:flex;}
    #over-box{background:linear-gradient(135deg,#2a0a0a,#1a0000);
      border:3px solid #CC2222;border-radius:22px;padding:36px;text-align:center;width:min(400px,90vw);}
    #over-box h1{color:#CC2222;font-size:2.5rem;margin-bottom:12px;}
    #over-box p{color:#ffaaaa;font-size:1.05rem;margin:8px 0;}

    /* Respawn flash */
    #flash{position:fixed;inset:0;background:rgba(255,50,50,0.55);
      pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:50;}

    /* Checkpoint popup */
    #cp-pop{position:fixed;top:120px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,0.85);color:#FFD700;font:bold 22px monospace;
      padding:12px 28px;border-radius:16px;border:3px solid #FFD700;
      opacity:0;transition:opacity 0.4s;pointer-events:none;}

    /* Win modal */
    #win-modal{position:fixed;inset:0;background:rgba(0,0,0,0.88);
      display:none;align-items:center;justify-content:center;z-index:100;}
    #win-modal.open{display:flex;}
    #win-box{background:linear-gradient(135deg,#1a1a2e,#16213e);
      border:3px solid #FFD700;border-radius:22px;padding:36px;text-align:center;
      max-width:460px;width:90%;}
    #win-box h1{color:#FFD700;font-size:2.4rem;margin-bottom:10px;}
    #win-box p{color:#fff;font-size:1.1rem;margin:8px 0;}
    #win-box .reward{font-size:1.8rem;margin:16px 0;}
    .wbtn{display:inline-block;margin:10px 8px 0;padding:14px 26px;
      font:bold 17px monospace;border:none;border-radius:12px;cursor:pointer;}
    #btn-stay{background:linear-gradient(135deg,#228833,#33AA44);color:#fff;}
    #btn-restart{background:linear-gradient(135deg,#AA2222,#CC4444);color:#fff;}
    .wbtn:hover{opacity:0.85;}

    /* Mobile controls */
    #dpad{position:fixed;bottom:20px;left:20px;width:160px;height:160px;z-index:10;}
    .dbtn{position:absolute;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.4);
      border-radius:10px;display:flex;align-items:center;justify-content:center;
      font-size:24px;cursor:pointer;user-select:none;touch-action:none;}
    #b-up   {width:52px;height:52px;top:0;left:54px;}
    #b-down {width:52px;height:52px;top:108px;left:54px;}
    #b-left {width:52px;height:52px;top:54px;left:0;}
    #b-right{width:52px;height:52px;top:54px;left:108px;}
    #b-jump{position:fixed;bottom:20px;right:20px;width:88px;height:88px;
      background:rgba(255,200,0,0.35);border:3px solid #FFD700;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font:bold 14px monospace;color:#FFD700;cursor:pointer;z-index:10;
      user-select:none;touch-action:none;}
    #b-sprint{position:fixed;bottom:120px;right:20px;width:72px;height:72px;
      background:rgba(255,100,0,0.35);border:3px solid #FF8800;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font:bold 12px monospace;color:#FF8800;cursor:pointer;z-index:10;
      user-select:none;touch-action:none;}

    /* Mode select */
    #mode-modal{position:fixed;inset:0;background:rgba(0,0,0,0.92);
      display:flex;align-items:center;justify-content:center;z-index:200;}
    #mode-box{background:linear-gradient(135deg,#0d0d2e,#1a0a3e);
      border:3px solid #FFD700;border-radius:24px;padding:44px 40px;
      text-align:center;width:min(420px,90vw);}
    #mode-box h1{color:#FFD700;font-size:2.6rem;margin-bottom:6px;letter-spacing:4px;}
    #mode-box p{color:#aaa;font:14px monospace;margin-bottom:32px;}
    .mode-btn{display:block;width:100%;margin:12px 0;padding:18px;
      font:900 20px monospace;border:none;border-radius:14px;
      cursor:pointer;letter-spacing:2px;transition:transform 0.1s,opacity 0.2s;}
    .mode-btn:hover{opacity:0.88;transform:scale(1.03);}
    #btn-1p{background:linear-gradient(135deg,#CC2222,#FF4444);color:#fff;}
    #btn-2p{background:linear-gradient(135deg,#1144CC,#3366FF);color:#fff;}
    .mode-btn .sub{display:block;font:11px monospace;letter-spacing:1px;
      opacity:0.75;margin-top:4px;}

    /* 2-player split */
    #splitline{position:fixed;top:0;left:50%;width:3px;height:100vh;
      background:rgba(255,255,255,0.3);pointer-events:none;z-index:6;display:none;}
    #p1-badge{position:fixed;top:14px;left:50%;margin-left:-88px;
      background:rgba(180,30,30,0.9);color:#fff;font:bold 13px monospace;
      padding:5px 12px;border-radius:8px;border:2px solid #FF4444;
      pointer-events:none;display:none;}
    #p2-badge{position:fixed;top:14px;left:50%;margin-left:10px;
      background:rgba(20,80,200,0.9);color:#fff;font:bold 13px monospace;
      padding:5px 12px;border-radius:8px;border:2px solid #4488FF;
      pointer-events:none;display:none;}
    #p2-coins{position:fixed;top:56px;right:18px;background:rgba(0,0,0,0.7);
      color:#FFD700;font:bold 16px monospace;padding:6px 13px;border-radius:14px;
      border:2px solid #4488FF;display:none;}
    #ctrl-hint{position:fixed;bottom:4px;left:50%;transform:translateX(-50%);
      color:rgba(255,255,255,0.55);font:10px monospace;text-align:center;
      pointer-events:none;display:none;}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="title-badge">OBSTACLE</div>
  <div id="coins-hud">💰 0</div>
  <div id="cp-hud">CP: 0 / 9</div>
  <div id="section-hud">GREEN PLAINS</div>
  <div id="sprint-hud">⚡ SPRINTING</div>
  <div id="hint-hud"></div>
  <div id="flash"></div>
  <div id="cp-pop">✓ CHECKPOINT!</div>
  <div id="sec-announce"></div>

  <!-- Game Over -->
  <div id="over-modal">
    <div id="over-box">
      <h1>💀 GAME OVER</h1>
      <p>You ran out of lives!</p>
      <p id="over-sub"></p>
      <br>
      <button class="wbtn" id="btn-retry" onclick="restartGame()" style="background:linear-gradient(135deg,#CC2222,#AA1111);color:#fff;display:inline-block;margin-top:10px;padding:14px 30px;font:bold 17px monospace;border:none;border-radius:12px;cursor:pointer;">🔄 Try Again</button>
      <button class="wbtn" style="background:linear-gradient(135deg,#f97316,#fbbf24);color:#fff;display:inline-block;margin-top:10px;padding:14px 30px;font:bold 17px monospace;border:none;border-radius:12px;cursor:pointer;" onclick="WackyShare.show('Obstacle Game','I collected '+document.getElementById('coins-hud').textContent+' in Obstacle Game!','https://wackybrains.com/obstacle-game/')">⬆ Share</button>
    </div>
  </div>

  <div id="win-modal">
    <div id="win-box">
      <h1>🏆 YOU WIN!</h1>
      <p>You completed the Obstacle!</p>
      <div class="reward">💰 50&nbsp;&nbsp;💎 1</div>
      <p id="win-sub">The chest is yours!</p>
      <br>
      <button class="wbtn" id="btn-stay" onclick="stayAtEnd()">🏝 Stay Here</button>
      <button class="wbtn" id="btn-restart" onclick="restartGame()">🔄 Restart</button>
      <button class="wbtn" style="background:linear-gradient(135deg,#f97316,#fbbf24);color:#fff;" onclick="WackyShare.show('Obstacle Game','I completed the Obstacle Course and collected '+document.getElementById('coins-hud').textContent+'!','https://wackybrains.com/obstacle-game/')">⬆ Share</button>
    </div>
  </div>

  <!-- Mobile d-pad -->
  <div id="dpad">
    <div class="dbtn" id="b-up">▲</div>
    <div class="dbtn" id="b-down">▼</div>
    <div class="dbtn" id="b-left">◀</div>
    <div class="dbtn" id="b-right">▶</div>
  </div>
  <div id="b-jump">JUMP</div>
  <div id="b-sprint">RUN</div>

  <!-- Mode select -->
  <div id="mode-modal">
    <div id="mode-box">
      <h1>OBSTACLE</h1>
      <p>Choose your game mode</p>
      <button class="mode-btn" id="btn-1p" onclick="startGame(1)">
        🎮 1 PLAYER
        <span class="sub">WASD + Space to jump</span>
      </button>
      <button class="mode-btn" id="btn-2p" onclick="startGame(2)">
        👥 2 PLAYERS
        <span class="sub">P1: WASD+Space &nbsp;|&nbsp; P2: Arrows+Enter</span>
      </button>
      <button onclick="WackyShare.show('Obstacle Game','Play Obstacle Game!','https://wackybrains.com/obstacle-game/')" style="background:linear-gradient(135deg,#f97316,#fbbf24);border:none;border-radius:14px;color:#fff;cursor:pointer;font-size:.95rem;font-weight:700;padding:14px 36px;margin-top:16px;display:inline-flex;align-items:center;gap:8px;box-shadow:0 5px 0 rgba(180,80,0,0.3),0 8px 20px rgba(249,115,22,0.35);transition:.18s;" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform=''">⬆ Share Game</button>
    </div>
  </div>

  <!-- 2P overlays (hidden until 2P mode) -->
  <div id="splitline"></div>
  <div id="p1-badge">🔴 P1</div>
  <div id="p2-badge">🔵 P2</div>
  <div id="p2-coins">💰 0</div>
  <div id="ctrl-hint">P1: WASD + Space to jump &nbsp;|&nbsp; P2: Arrow keys + Enter to jump</div>

  <script src="game.js"></script>
  <script src="/share-widget.js"></script>
</body>
</html>
