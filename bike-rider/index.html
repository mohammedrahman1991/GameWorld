<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <title>Bike Rider</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;}
    #c{display:block;}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="splash" style="position:fixed;inset:0;z-index:100;background:linear-gradient(135deg,#1a1a2e,#0e3460);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;font-family:'Segoe UI',system-ui,sans-serif;">
    <div style="font-size:4rem;">🚴</div>
    <h1 style="font-size:2.4rem;font-weight:900;color:#fff;margin:0;">Bike Rider</h1>
    <p style="color:rgba(255,255,255,.65);font-size:.95rem;margin:0;">Ride fast, dodge everything!</p>
    <button onclick="document.getElementById('splash').style.display='none'" style="background:linear-gradient(135deg,#7c3aed,#06b6d4);border:none;border-radius:14px;color:#fff;cursor:pointer;font-size:1.05rem;font-weight:700;padding:15px 48px;box-shadow:0 5px 0 rgba(0,0,0,0.3);">▶ Play</button>
    <button onclick="WackyShare.show('Bike Rider','Play Bike Rider!','https://wackybrains.com/bike-rider/')" style="background:linear-gradient(135deg,#f97316,#fbbf24);border:none;border-radius:14px;color:#fff;cursor:pointer;font-size:.95rem;font-weight:700;padding:13px 36px;box-shadow:0 5px 0 rgba(180,80,0,0.3);">⬆ Share Game</button>
  </div>
  <button id="wb-share-btn" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 32px;background:linear-gradient(135deg,#f97316,#fbbf24);border:none;border-radius:12px;color:#fff;font-size:1rem;font-weight:800;cursor:pointer;z-index:999;">⬆ Share Result</button>
  <script src="game.js"></script>
  <script src="/share-widget.js"></script>
</body>
</html>
